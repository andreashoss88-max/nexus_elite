<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS COMMAND | MASTER</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059; --gold-br: #f1d592; --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(197, 160, 89, 0.25);
            --green: #00ff88; --red: #ff3131;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; }

        #bg-canvas { position: fixed; top:0; left:0; z-index: -1; opacity: 0.15; }
        .container { width: 100%; max-width: 650px; margin: auto; padding: 25px; }

        h1 { 
            font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 12px; 
            text-transform: uppercase; text-align: center; margin: 40px 0;
            background: linear-gradient(to bottom, #fff, var(--gold), #555);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2.2rem; filter: drop-shadow(0 0 15px rgba(197,160,89,0.3));
        }

        .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .node { background: rgba(0,0,0,0.8); border: 1px solid #222; padding: 12px; border-radius: 12px; text-align: center; }
        .node span { display: block; font-size: 0.5rem; font-weight: 900; letter-spacing: 2px; color: #333; }
        .node.active { border-color: var(--green); box-shadow: 0 0 15px rgba(0,255,136,0.15); }
        .node.active span { color: var(--green); text-shadow: 0 0 8px var(--green); }

        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 20px; }
        
        .nav { display: flex; gap: 6px; background: #000; padding: 6px; border-radius: 18px; margin-bottom: 25px; border: 1px solid #111; }
        .nav-btn { flex: 1; padding: 16px; text-align: center; cursor: pointer; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; color: #555; border-radius: 14px; }
        .nav-btn.active { color: #000; background: var(--gold); }

        .rev-val { font-family: 'Orbitron'; font-size: 3.5rem; font-weight: 900; color: var(--gold); text-align: center; margin: 10px 0; }
        
        .unit-pill { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px; border-radius: 15px; background: rgba(255,255,255,0.03); 
            margin-bottom: 10px; border: 1px solid transparent; cursor: pointer; 
        }
        .unit-pill.panic { border-color: var(--red); background: rgba(255, 49, 49, 0.1); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        input, textarea { 
            width: 100%; background: #000; border: 1px solid var(--border); padding: 18px; 
            border-radius: 15px; color: #fff; margin-top: 12px; font-size: 1rem;
        }
        
        .btn { 
            width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer;
            font-size: 0.8rem; font-family: 'Orbitron'; margin-top: 15px;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-br), var(--gold)); color: #000; }

        .chat-wrap { height: 350px; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 85%; font-size: 0.85rem; }
        .msg-lady { background: #1a1a1a; align-self: flex-start; }
        .msg-boss { background: rgba(197, 160, 89, 0.1); border: 1px solid var(--gold); align-self: flex-end; color: var(--gold-br); }

        #view-boss, #view-detail { display: none; }
        
        /* Error Message Overlay */
        #error-msg { color: var(--red); font-size: 0.7rem; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="view-login" class="container">
        <h1>NEXUS</h1>
        <div class="card" style="text-align: center;">
            <input type="password" id="auth-key" placeholder="MASTER ACCESS KEY" style="text-align: center; letter-spacing: 10px;">
            <div id="error-msg">CODE UNGÜLTIG ODER KEINE VERBINDUNG</div>
            <button class="btn btn-gold" id="login-btn" onclick="handleAuth()">INITIALIZE</button>
        </div>
    </div>

    <div id="view-boss" class="container">
        <div class="status-grid">
            <div id="node-bridge" class="node"><span>BRIDGE</span></div>
            <div id="node-radar" class="node"><span>RADAR</span></div>
            <div id="node-ai" class="node"><span>AI-FLOW</span></div>
        </div>
        <h1>COMMAND</h1>
        <div class="nav">
            <div class="nav-btn active" id="tab-u-btn" onclick="switchTab('u')">Units</div>
            <div class="nav-btn" id="tab-m-btn" onclick="switchTab('m')">Mail</div>
            <div class="nav-btn" id="tab-f-btn" onclick="switchTab('f')">Imperial</div>
        </div>

        <div id="tab-u"><div id="unit-list"></div></div>

        <div id="tab-m" style="display:none;">
            <div class="card">
                <input id="mail-to" placeholder="An">
                <input id="mail-sub" placeholder="Betreff">
                <textarea id="mail-body" style="height:100px;" placeholder="Nachricht..."></textarea>
                <button class="btn btn-gold" onclick="queueMail()">SEND VIA ENGINE</button>
            </div>
        </div>

        <div id="tab-f" style="display:none;">
            <div class="card" style="text-align:center;">
                <p style="font-size:0.6rem; letter-spacing:4px; color:#555;">GLOBAL REVENUE</p>
                <div class="rev-val" id="total-rev">0 €</div>
                <p style="font-size:0.7rem; color:var(--gold);">Your 20%: <span id="comm-val">0</span> €</p>
            </div>
        </div>
    </div>

    <div id="view-detail" class="container">
        <button class="btn" style="background:none; color:var(--gold); text-align:left; width:auto;" onclick="backToMain()">← ZURÜCK</button>
        <h1 id="unit-name-title" style="font-size: 1.2rem;">UNIT</h1>
        <div class="card">
            <div class="chat-wrap" id="chat-container"></div>
            <input id="boss-msg-input" placeholder="Anweisung...">
            <button class="btn btn-gold" onclick="sendBossMessage()">SENDEN</button>
        </div>
    </div>

    <script>
        // --- DEINE DATEN HIER EINTRAGEN ---
        const URL = "https://azjpytibufkcdemreyvn.supabase.co"; 
        const KEY = "sb_publishable_S8eDSg6V_b8RlG7WJN8cRA_9z4jnFd9"; 
        // ----------------------------------

        const sb = supabase.createClient(URL, KEY);
        let master = null;
        let selectedUnitId = null;

        // LOGIN FUNKTION MIT ENTER-SUPPORT & FEEDBACK
        async function handleAuth() {
            const input = document.getElementById('auth-key');
            const err = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');
            
            btn.innerText = "CONNECTING...";
            err.style.display = "none";

            try {
                const { data, error } = await sb.from('profiles')
                    .select('*')
                    .eq('nexus_code', input.value)
                    .eq('role', 'admin')
                    .single();

                if (data) {
                    master = data;
                    document.getElementById('view-login').style.display = 'none';
                    document.getElementById('view-boss').style.display = 'block';
                    startHeartbeat();
                } else {
                    throw new Error("Nicht gefunden");
                }
            } catch (e) {
                err.style.display = "block";
                btn.innerText = "INITIALIZE";
                input.value = "";
            }
        }

        // Enter-Taste im Login-Feld abfangen
        document.getElementById('auth-key').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleAuth();
        });

        function switchTab(t) {
            ['u','m','f'].forEach(tab => {
                document.getElementById('tab-'+tab).style.display = (t === tab) ? 'block' : 'none';
                document.getElementById('tab-'+tab+'-btn').className = 'nav-btn ' + (t === tab ? 'active' : '');
            });
        }

        async function startHeartbeat() {
            const { data: units } = await sb.from('profiles').select('*').neq('role', 'admin');
            let total = 0;
            if(units) {
                document.getElementById('unit-list').innerHTML = units.map(u => {
                    total += u.daily_revenue || 0;
                    return `<div class="unit-pill ${u.is_panic ? 'panic' : ''}" onclick="openUnit('${u.id}', '${u.name}')">
                        <b>${u.name.toUpperCase()}</b><span>${u.daily_revenue || 0} €</span>
                    </div>`;
                }).join('');
            }

            document.getElementById('total-rev').innerText = total + " €";
            document.getElementById('comm-val').innerText = (total * 0.2).toFixed(2);

            const { data: pings } = await sb.from('messages').select('content').eq('portal_name', 'SYS_PING');
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
            if(pings) {
                pings.forEach(p => {
                    const node = document.getElementById('node-' + p.content.toLowerCase());
                    if(node) node.classList.add('active');
                });
            }

            if(selectedUnitId) refreshChat();
            setTimeout(startHeartbeat, 5000);
        }

        async function openUnit(id, name) {
            selectedUnitId = id;
            document.getElementById('view-boss').style.display = 'none';
            document.getElementById('view-detail').style.display = 'block';
            document.getElementById('unit-name-title').innerText = name;
            refreshChat();
        }

        async function refreshChat() {
            const { data } = await sb.from('messages').select('*').eq('lady_id', selectedUnitId).order('created_at', {ascending: true});
            if(data) {
                document.getElementById('chat-container').innerHTML = data.map(m => `
                    <div class="msg ${m.direction === 'in' ? 'msg-lady' : 'msg-boss'}">${m.content}</div>
                `).join('');
                const c = document.getElementById('chat-container'); c.scrollTop = c.scrollHeight;
            }
        }

        async function sendBossMessage() {
            const i = document.getElementById('boss-msg-input');
            if(!i.value) return;
            await sb.from('messages').insert([{ lady_id: selectedUnitId, content: i.value, direction: 'out', portal_name: 'BOSS' }]);
            i.value = ''; refreshChat();
        }

        function backToMain() {
            selectedUnitId = null;
            document.getElementById('view-detail').style.display = 'none';
            document.getElementById('view-boss').style.display = 'block';
        }

        // MATRIX BG
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = new Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#c5a059'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*10), i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
